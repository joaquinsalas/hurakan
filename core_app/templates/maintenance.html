<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mantenimiento de la Aplicación</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container { /* Changed from login-container for better semantics */
            background-color: #ffffff;
            padding: 30px 40px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 90%;
            box-sizing: border-box;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 25px;
            font-weight: 600;
        }

        p {
            color: #555;
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .alert {
            padding: 12px 15px;
            margin-bottom: 20px;
            border: 1px solid transparent;
            border-radius: 4px;
            font-size: 0.9em;
            text-align: left;
        }
        .alert-info { background-color: #d1ecf1; color: #0c5460; border-color: #bee5eb; } /* Using info alert for maintenance */

    </style>
</head>
<body>
    <div class="container">
        <h1>¡Hurakan en Mantenimiento!</h1>

        <div class="alert alert-info">
            Estamos realizando mejoras importantes para ofrecerte una mejor experiencia.
            Agradecemos tu paciencia y te pedimos disculpas por cualquier inconveniente.
            <br><br>
            **Estaremos de vuelta pronto.**
        </div>

        <p>Por favor, intenta acceder de nuevo el 30/06/2025 a las 00:00 UTC.</p>
    </div>
</body>
</html>
